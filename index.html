<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Meu Site</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#0f172a,#2563eb);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        h1{
            font-size:60px;
            margin-bottom:10px;
        }

        p{
            font-size:22px;
        }

        button{
            padding:15px 30px;
            font-size:18px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            background:white;
            color:#2563eb;
            margin-top:20px;
        }

        button:hover{
            transform:scale(1.05);
        }
    </style>
</head>
<body>

<div>
    <h1>Bem-vindo!</h1>
    <p>Este é o meu primeiro site criado com GitHub Pages.</p>

    <button onclick="alert('Olá! 😀')">
        Clica aqui
    </button>
</div>

</body>
</html>
